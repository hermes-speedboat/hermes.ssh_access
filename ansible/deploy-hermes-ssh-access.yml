---
- name: Deploy Hermes SSH access for standalone Linux hosts
  hosts: all
  become: true
  gather_facts: true

  vars:
    hermes_user: hermes
    hermes_comment: Hermes Agent privileged SSH identity
    hermes_home: "/home/{{ hermes_user }}"
    hermes_shell_default: /bin/sh

    # Provide this via inventory, Ansible Vault, or -e.
    hermes_ssh_public_key: ""

  pre_tasks:
    - name: Validate Hermes SSH public key was provided
      ansible.builtin.assert:
        that:
          - hermes_ssh_public_key | length > 0
          - hermes_ssh_public_key is match('^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp[0-9]+) .+')
        fail_msg: >-
          Set hermes_ssh_public_key to the public key for the hermes identity.

    - name: Install sudo on Alpine
      ansible.builtin.apk:
        name: sudo
        state: present
      when: ansible_facts.os_family == 'Alpine'

    - name: Install sudo on Debian/Ubuntu and RHEL-family systems
      ansible.builtin.package:
        name: sudo
        state: present
      when: ansible_facts.os_family in ['Debian', 'RedHat']

  tasks:
    - name: Detect bash
      ansible.builtin.stat:
        path: /bin/bash
      register: hermes_bash_stat

    - name: Set Hermes login shell
      ansible.builtin.set_fact:
        hermes_login_shell: "{{ '/bin/bash' if hermes_bash_stat.stat.exists else hermes_shell_default }}"

    - name: Create Hermes user
      ansible.builtin.user:
        name: "{{ hermes_user }}"
        comment: "{{ hermes_comment }}"
        home: "{{ hermes_home }}"
        shell: "{{ hermes_login_shell }}"
        create_home: true
        state: present

    - name: Ensure Hermes SSH directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}/.ssh"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"

    - name: Install Hermes authorized_keys
      ansible.builtin.copy:
        dest: "{{ hermes_home }}/.ssh/authorized_keys"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
        content: "{{ hermes_ssh_public_key }}\n"

    - name: Deploy Hermes sudoers rule
      ansible.builtin.copy:
        dest: /etc/sudoers.d/10-hermes
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
        content: |
          # Managed by Ansible: Hermes Agent privileged SSH identity.
          # The target grants full passwordless sudo.
          # Non-read execution must be approved by Hermes before command submission.
          {{ hermes_user }} ALL=(ALL) NOPASSWD: ALL

    - name: Remove legacy split-identity read sudoers rule
      ansible.builtin.file:
        path: /etc/sudoers.d/10-hermes-read
        state: absent

    - name: Remove legacy split-identity admin sudoers rule
      ansible.builtin.file:
        path: /etc/sudoers.d/20-hermes-admin
        state: absent

    - name: Verify sudoers syntax after deployment
      ansible.builtin.command: visudo -c
      changed_when: false
